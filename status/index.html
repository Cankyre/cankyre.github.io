<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" href="./img/Cankyre.ico" type="image/x-icon" />
    <link rel="stylesheet" href="../fonts/fira_code/fira_code.css" />
    <link rel="stylesheet" href="../fonts/dropicons/webfont.css" />
    <link rel="stylesheet" href="../css/status.css" />
    <title>Cankyre | App statuses</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.7.1/dist/chart.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/underscore@1.13.2/underscore-umd-min.js"></script>
  </head>
  <body>
    <h1 class="title is-2">Cankyre</h1>
    <h2 class="subtitle is-3">all APIs statuses</h2>
    <div id="canvas-container">
      <canvas id="chart"></canvas>
    </div>
    <div class="btns">
      <button class="button is-info is-light" onclick="window.location.href='https://cankyre.github.io'">Home</button>
      <button class="button is-warning is-light" onclick="location.reload()">Reload</button>
      <button class="button is-danger is-light" onclick="window.open('https://cankyre.github.io/form/','_blank')">Report</button>
    </div>
    <script>
      function setDarkTheme() {
        Chart.defaults.color = "#fff"
        const light = document.getElementsByClassName("is-light")
        for (j=0;j<5;j++) {
          for (i=0;i<light.length;i++) {
            light[i].className = light[i].className.replace("is-light", "")
          }
        }
      }

      if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
        setDarkTheme( )
      }
    </script>
    <script src="./status.js"></script>
  </body>
</html>
