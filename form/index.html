<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="shortcut icon"
      href="https://raw.githubusercontent.com/Cankyre/cankyre.github.io/main/img/Cankyre.ico"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="../css/form.css" />
    <title>Report form</title>
  </head>
  <body>
    <script src="../js/pingCentral.js"></script>
    <h1 class="title is-3 headtitle">
      Cankyre's 3-questions request/report form
    </h1>
    <h2 class="subtitle is-4 headtitle">
      Bug reports/Feature requests for Cankyre products
    </h2>
    <div class="message is-danger" id="api-outage-message">
      <div class="message-header">
        <h1>API outage</h1>
      </div>
      <div class="message-body">
        We are currently experiencing an API outage. Therefore this form will
        not work as intended. Please
        <a href="mailto:cankyre@gmail.com">report it by email</a> in order for
        us to investigate the bug.
      </div>
    </div>
    <!--
      <article class="message is-warning">
      <div class="message-header">Warning</div>
      <div class="message-body">
        If the below form turns out not to work because of a server error,
        please report it to me with
        <a href="mailto:cankyre@gmail.com">an email</a> or with any other way to
        <a href="../index.html#contact">contact me</a> as soon as possible.
      </div>
    </article>
      -->
    <div class="form-container">
      <form>
        <div class="field is-bordered" id="q1-outer">
          <label for="product" class="label"
            >1. Which of my product is the source of your request?</label
          >
          <div class="select">
            <select name="q1" id="q1">
              <option value="Pouik">Pouik</option>
              <option value="TetoStats">TetoStats</option>
              <option value="ParpaingBot">ParpaingBot</option>
              <option value="cankyre.github.io">Cankyre.github.io</option>
              <option value="rdparpaing.github.io">Rdparpaing.github.io</option>
              <option value="NyaScript">NyaScript</option>
              <option value="NyaScript-vscode">NyaScript-vscode</option>
              <option value="Tetostats-recorder">Tetostats-recorder</option>
              <option value="Other">Other (describe in question 3)</option>
            </select>
          </div>
        </div>
        <div class="field is-bordered" id="q2-outer">
          <label for="frir" class="label"
            >2. Are you making bug report or a feature request?
          </label>
          <div class="control" id="q2">
            <label class="radio">
              <input type="radio" name="frir" />
              Bug report
            </label>
            <label class="radio">
              <input type="radio" name="frir" />
              Feature request
            </label>
            <label class="radio">
              <input type="radio" name="frir" />
              Content/user report
            </label>
            <label class="radio">
              <input type="radio" name="frir" />
              Other (describe in question 3)
            </label>
          </div>
        </div>
        <div class="field is-bordered" id="q3-outer">
          <label for="message" class="label"
            >3. Please describe your bug.
            <span class="tag is-danger is-light">NOTE:</span> You can report once every 5min. You may report multiple things at once.
        </label>
          <label class="label"></label>
          <div class="control">
            <textarea
              class="textarea"
              placeholder="Your bug"
              id="q3"
            ></textarea>
          </div>
        </div>
        <div class="field is-grouped">
          <div class="control">
            <button class="button is-link" id="submit">Submit</button>
          </div>
          <div class="control">
            <button class="button is-success is-light" id="home">Home</button>
          </div>
          <div class="control">
            <button
              class="button is-link is-light"
              onclick="window.open('https://cankyre.github.io?goto=botenv','_blank')"
            >
              Support server
            </button>
          </div>
          <div class="control">
            <button
              class="button is-info is-light"
              onclick="window.open('https://github.com/Cankyre/cankyre.github.io#form---how-to-deal-with-the-color-codes','_blank')"
            >
              Help
            </button>
          </div>
        </div>
      </form>
    </div>
    <script src="./form.js"></script>
    <script>
      function setDarkTheme() {
        const light = document.getElementsByClassName("is-light");
        for (j = 0; j < 5; j++) {
          for (i = 0; i < light.length; i++) {
            light[i].className = light[i].className.replace("is-light", "");
          }
        }
      }

      if (
        window.matchMedia &&
        window.matchMedia("(prefers-color-scheme: dark)").matches
      ) {
        setDarkTheme();
      }
    </script>
  </body>
</html>
