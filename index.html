<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./fonts/fira_code.css" />
    <link rel="stylesheet" href="style.css" />
    <title>Cankyre</title>
  </head>
  <body>
    <script>
      const params = new URLSearchParams(window.location.search);
      if (params.has("goto")) {
        fetch("https://parpaing-bot.thatcookie.repl.co/goto")
        .then(async r => {
          const textjson = await r.json()
          if (textjson[params.get("goto")]) {
            window.location.href = textjson[params.get("goto")]
          }
        })
      }
    </script>
    <h1 class="title is-2">Cankyre</h1>
    <img src="./img/Cankyre.png" alt="My profile picture" class="pfp" />
    <div class="goto columns" id="goto">
      <div class="column is-one-fifth goto-sign">
        <p class="is-vcentered">goto</p>
      </div>
      <div class="column">
        <input type="text" class="input goto-input" id="goto-input" />
      </div>
    </div>
    <button class="button is-info is-light helpbtn" onclick="window.open('https://github.com/Cankyre/cankyre.github.io','_blank')">Available gotos</button>
    <script src="main.js"></script>
  </body>
</html>
